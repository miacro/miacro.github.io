<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>扫雷</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="game-card" aria-label="扫雷游戏">
      <header class="topbar">
        <div>
          <h1>扫雷</h1>
          <p>经典模式 · 本地可玩 · 网页可部署</p>
        </div>
        <a class="source-link" href="https://minesweeper.cn" target="_blank" rel="noreferrer">参考 minesweeper.cn</a>
      </header>

      <div class="controls" aria-label="游戏设置">
        <button id="settingsToggle" class="level" type="button">设置</button>
        <button id="helpToggle" class="level" type="button">帮助</button>
        <button id="bestToggle" class="level" type="button">最佳成绩</button>
        <button id="historyToggle" class="level" type="button">历史战绩</button>
        <button class="level" data-level="beginner" type="button">初级</button>
        <button class="level" data-level="intermediate" type="button">中级</button>
        <button class="level is-active" data-level="expert" type="button">高级</button>
        <button class="level" data-level="custom" type="button">自定义</button>
      </div>

      <div id="settingsPanel" class="settings-panel" hidden>
        <label class="zoom-control">
          <span class="visually-hidden">缩放</span>
          <select id="zoomInput" title="缩放" aria-label="缩放">
            <option value="50">50%</option>
            <option value="75">75%</option>
            <option value="100" selected>100%</option>
            <option value="125">125%</option>
            <option value="150">150%</option>
            <option value="175">175%</option>
            <option value="200">200%</option>
            <option value="225">225%</option>
            <option value="250">250%</option>
            <option value="275">275%</option>
            <option value="300">300%</option>
          </select>
        </label>
        <label class="option-control"><input id="noGuessToggle" type="checkbox">无猜</label>
        <label class="option-control"><input id="soundToggle" type="checkbox">音效</label>
        <label class="option-control">触屏
          <select id="touchMode">
            <option value="open">点开长按标</option>
            <option value="flag">点标长按开</option>
          </select>
        </label>
        <button id="exportGame" type="button">保存局面</button>
        <label class="history-import">加载局面<input id="importGame" type="file" accept="application/json,.json"></label>
      </div>

      <form class="custom-panel" id="customPanel" hidden>
        <label>宽 <input id="customCols" type="number" min="8" max="40" value="16"></label>
        <label>高 <input id="customRows" type="number" min="8" max="30" value="16"></label>
        <label>雷 <input id="customMines" type="number" min="10" max="300" value="40"></label>
        <button type="submit">开始</button>
      </form>

      <div class="meta-panel">
        <span id="bestTime">最佳：--</span>
        <span id="statusText">未开始</span>
        <button id="pauseButton" type="button">暂停</button>
        <button id="retryButton" type="button">同局重开</button>
      </div>

      <div class="play-layout">
        <aside class="side-panel" aria-label="战绩面板">
          <section id="bestPanel" class="info-panel" aria-label="最佳成绩" hidden>
            <strong>最佳成绩</strong>
            <ol id="bestList" class="history-list"></ol>
          </section>

          <section id="historyPanel" class="history-panel" aria-label="历史战绩" hidden>
            <div class="history-title">
              历史战绩
              <select id="historyFilter" aria-label="历史筛选">
                <option value="all">全部</option>
                <option value="初级">初级</option>
                <option value="中级">中级</option>
                <option value="高级">高级</option>
                <option value="自定义">自定义</option>
              </select>
              <select id="historySort" aria-label="历史排序">
                <option value="timeDesc">时间新到旧</option>
                <option value="timeAsc">时间旧到新</option>
                <option value="secondsAsc">用时短到长</option>
                <option value="secondsDesc">用时长到短</option>
              </select>
              <button id="exportHistory" type="button">保存到文件</button>
              <label class="history-import">从文件加载<input id="importHistory" type="file" accept="application/json,.json"></label>
              <button id="clearHistory" type="button">清空</button>
            </div>
            <ol id="historyList" class="history-list"></ol>
          </section>
        </aside>

        <div class="game-frame">
          <div id="statusbar" class="statusbar">
            <div class="counter" aria-label="剩余雷数"><span id="mineCount">010</span></div>
            <div id="face" class="face" aria-hidden="true">🙂</div>
            <div class="counter" aria-label="用时"><span id="timer">000</span></div>
          </div>
          <div id="board" class="board" role="grid" aria-label="扫雷棋盘"></div>
        </div>
      </div>

      <div id="pauseOverlay" class="pause-overlay" hidden>已暂停</div>
      <div id="resultPanel" class="result-panel" hidden></div>

      <section id="helpPanel" class="info-panel" aria-label="帮助" hidden>
        <strong>帮助</strong>：左键翻开；右键循环旗/问号/空；数字周围标旗数匹配时单击数字展开；快捷键 R 重开、P 暂停、H 历史、1/2/3 切换难度。
      </section>

      <footer class="help-text">
        左键翻开，右键循环标记旗/问号/空。数字周围标旗数匹配时，单击数字可快速翻开周围格子。移动端长按标记。
      </footer>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
