<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A collection of browser games and tools.">
  <title>Projects</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #17201a;
      background: #eef2ed;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: clamp(48px, 10vh, 96px) 24px 24px;
    }

    main {
      width: min(100%, 680px);
      margin: 0 auto;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 2rem;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #5c685f;
    }

    nav {
      display: grid;
      gap: 10px;
    }

    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      padding: 14px 16px;
      color: inherit;
      background: #ffffff;
      border: 1px solid #cbd4cd;
      border-radius: 7px;
      text-decoration: none;
      transition: border-color 120ms ease, transform 120ms ease;
    }

    a:hover,
    a:focus-visible {
      border-color: #52735d;
      transform: translateY(-1px);
      outline: none;
    }

    strong {
      font-size: 1rem;
    }

    span {
      color: #52735d;
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Projects</h1>
      <p>Games and tools available on this site.</p>
    </header>

    <nav aria-label="Projects">
      <a href="/minesweeper/">
        <strong>Minesweeper</strong>
        <span aria-hidden="true">&rarr;</span>
      </a>
    </nav>
  </main>
</body>
</html>
